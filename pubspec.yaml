name: caliana
description: "Caliana — your sassy British AI calorie coach. Snap, speak, sorted."
publish_to: 'none'

version: 3.1.0+51

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  firebase_analytics: ^11.4.1
  shared_preferences: ^2.3.3
  http: ^1.2.2
  record: ^5.2.1
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  audioplayers: ^6.1.0
  in_app_review: ^2.0.10

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/appstore.png"
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/playstore.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/playstore.png
    - assets/appstore.png
    - assets/caliana.png
