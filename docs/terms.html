<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terms of Use — Caliana</title>
  <style>
    :root {
      --bg: #F7F8FC; --card: #FFFFFF; --text: #0F172A; --muted: #6B7280;
      --primary: #2F6BFF; --border: #E5E7EB;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.65; -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 56px 24px 96px; }
    .back {
      display: inline-block; margin-bottom: 24px;
      font-size: 13px; font-weight: 700; color: var(--primary);
      text-decoration: none; letter-spacing: -0.1px;
    }
    .back:hover { text-decoration: underline; }
    h1 {
      font-size: 38px; font-weight: 900; letter-spacing: -1px;
      margin: 0 0 6px;
    }
    .updated { font-size: 13px; color: var(--muted); margin: 0 0 32px; }
    article {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; padding: 36px;
    }
    article h2 {
      font-size: 20px; font-weight: 800; letter-spacing: -0.3px;
      margin: 28px 0 8px; color: var(--primary);
    }
    article h2:first-child { margin-top: 0; }
    article p { margin: 0 0 14px; font-size: 15px; }
    article ul { margin: 0 0 14px; padding-left: 20px; }
    article li { margin: 4px 0; font-size: 15px; }
    article a { color: var(--primary); }
    footer {
      margin-top: 32px; text-align: center; font-size: 12px; color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <a class="back" href="./">← Back</a>
    <h1>Terms of Use</h1>
    <p class="updated">Last updated: <!-- DATE --></p>

    <article>
      <!--
        ============================================================
        PASTE YOUR TERMS OF USE / EULA HTML INSIDE THIS <article>.
        Use <h2>Section Title</h2> for headings, <p>...</p> for
        paragraphs, <ul><li>...</li></ul> for lists. Styling is
        already wired — just write the words.

        Apple expects subscription terms to cover: title, length,
        price (with per-unit price if applicable), auto-renewal,
        cancellation, and refund policy. If you'd rather use Apple's
        standard EULA, you can either (a) reference it here with a
        link, or (b) drop the link directly into App Store Connect
        → App Description.
        ============================================================
      -->

      <h2>Replace this with your first section</h2>
      <p>Paste your terms of use / EULA text here.</p>

    </article>

    <footer>
      © Caliana. All rights reserved.
    </footer>
  </main>
</body>
</html>
