name: Build Flutter AAB - Final

on:
  # Allow manual runs from any branch — handy for verifying the
  # keystore on a feature branch before merging to main.
  workflow_dispatch:
  push:
    branches: [ main, "claude/**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
      JAVA_TOOL_OPTIONS: "-Xmx3g"

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: stable
          cache: true

      - name: Write local.properties
        run: |
          mkdir -p android
          FLUTTER_SDK=$(dirname "$(dirname "$(which flutter)")")
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Precache Flutter engine
        run: flutter precache --android --force

      - name: flutter pub get
        run: flutter pub get

      - name: Verify keystore + print upload-key fingerprints
        run: |
          set -e
          echo "Using keystore from repo: android/app/upload-keystore.jks"
          ls -l android/app/upload-keystore.jks
          echo ""
          echo "=========================================================="
          echo "  CALIANA UPLOAD KEY FINGERPRINTS"
          echo "  Register these with Google Play Console → App integrity"
          echo "=========================================================="
          # Pull the cert details and print the fingerprint lines so they
          # can be copied straight from the workflow log into Play Console.
          keytool -list -v \
            -keystore android/app/upload-keystore.jks \
            -alias caliana \
            -storepass caliana2026 \
            -keypass caliana2026 \
          | grep -E "Owner:|Valid|MD5:|SHA1:|SHA256:" \
          | sed 's/^[[:space:]]*//'
          echo "=========================================================="
          # Also stash the SHA-1 in the build summary so it shows up at
          # the top of the workflow run on the GitHub Actions page.
          SHA1=$(keytool -list -v \
            -keystore android/app/upload-keystore.jks \
            -alias caliana \
            -storepass caliana2026 \
            -keypass caliana2026 \
          | grep "SHA1:" | head -n1 | awk -F'SHA1:' '{print $2}' | xargs)
          SHA256=$(keytool -list -v \
            -keystore android/app/upload-keystore.jks \
            -alias caliana \
            -storepass caliana2026 \
            -keypass caliana2026 \
          | grep "SHA256:" | head -n1 | awk -F'SHA256:' '{print $2}' | xargs)
          {
            echo "## 🔑 Caliana upload-key fingerprints"
            echo ""
            echo "Paste these into Google Play Console → **App integrity** → **Upload key certificate**:"
            echo ""
            echo '```'
            echo "SHA-1:   $SHA1"
            echo "SHA-256: $SHA256"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "KEY_ALIAS=caliana" >> $GITHUB_ENV
          echo "STORE_PASSWORD=caliana2026" >> $GITHUB_ENV
          echo "KEY_PASSWORD=caliana2026" >> $GITHUB_ENV

      - name: Build signed AAB
        run: |
          flutter build appbundle --release --build-number $GITHUB_RUN_NUMBER --no-tree-shake-icons

      - name: Upload artifact (primary path)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      - name: Upload artifact (fallback path)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-fallback
          path: build/app/outputs/bundle/*/app-*.aab
          if-no-files-found: ignore
